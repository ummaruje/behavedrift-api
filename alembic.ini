[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Set main database URL — overridden by ALEMBIC_MIGRATION_URL env var if set
sqlalchemy.url = postgresql+asyncpg://behavedrift:behavedrift_dev@localhost:5432/behavedrift_dev

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
